name: tasbih_f
description: A professional, single-screen, fully responsive Tasbih app by Fadi.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  vibration: ^2.0.1
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10 # For the coffee button if needed or custom icons
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "logo.png"
  windows:
    generate: true
    image_path: "logo.png"
  macos:
    generate: true
    image_path: "logo.png"

flutter:
  uses-material-design: true
  assets:
    - logo.png
